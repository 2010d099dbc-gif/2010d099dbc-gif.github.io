  <p>NICHIWA · 业务手册</p>
  <input id="pin" type="password" placeholder="请输入访问密码" autocomplete="off">
  <button id="go">打 开</button>
  <p id="msg"></p>
</div>
<script>
async function unlock(pw, silent){
  const msg=document.getElementById("msg"), lock=document.getElementById("lock");
  try{
    msg.textContent="解锁中…"; msg.style.color="#9a938c";
    const buf=await (await fetch("data.bin",{cache:"force-cache"})).arrayBuffer();
    const salt=buf.slice(0,16), iv=buf.slice(16,28), ct=buf.slice(28);
    const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:310000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
    localStorage.setItem("nichiwa_pw",pw);
    const html=new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  }catch(e){
    localStorage.removeItem("nichiwa_pw");
    if(!silent){ msg.textContent="密码不对，再试试"; msg.style.color="#c0392b";
      lock.classList.add("err"); setTimeout(()=>lock.classList.remove("err"),400); }
    else { msg.textContent=""; }
  }
}
document.getElementById("go").onclick=()=>unlock(document.getElementById("pin").value.trim(),false);
document.getElementById("pin").addEventListener("keydown",e=>{if(e.key==="Enter")unlock(e.target.value.trim(),false);});
const saved=localStorage.getItem("nichiwa_pw");
if(saved) unlock(saved,true);
</script>
